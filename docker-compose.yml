networks:
    neo4j-laravel:


services:
    php:
        user: root:${UID-1000}:${GID-1000}
        build:
            context: .
        ports:
            - 80:${DOCKER_HOST_APP_PORT:-8000}
        volumes:
            - ./:/opt/project
        command: "php ./example-app/artisan serve --host=0.0.0.0 --port=8000"
        environment:
            - NEO4J_HOST=neo4j
            - NEO4J_DATABASE=neo4j
            - NEO4J_PORT=7687
            - NEO4J_USERNAME=neo4j
            - NEO4J_PASSWORD=testtest
            - XDEBUG_CONFIG="client_host=host.docker.internal log=/tmp/xdebug.log"
        working_dir: /opt/project
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - neo4j-laravel
    neo4j:
        environment:
            - NEO4J_AUTH=neo4j/testtest
        image: neo4j:5.22
        ports:
            - ${DOCKER_HOST_NEO4J_HTTP_PORT:-7474}:7474
            - ${DOCKER_HOST_NEO4J_BOLT_PORT:-7687}:7687
        networks:
            - neo4j-laravel